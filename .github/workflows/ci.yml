name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PGRX_VERSION: "0.19.1"
  FELATAB_MODEL_URL: "https://d1ruypri5fhwvl.cloudfront.net/felatab/v1/felatab_int8.safetensors"
  FELATAB_MODEL_SHA256: "547c451a182f4a61aa4ab811efd1fe2e8c57b75b61e4256b28114934dc539741"

jobs:
  lint:
    name: rustfmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install PostgreSQL dev headers + libclang (pgrx needs bindgen)
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-server-dev-16 libclang-dev clang build-essential
      - name: Rust toolchain
        run: rustup component add rustfmt clippy
      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked
      - name: pgrx init (register system PG 16 so pgrx-pg-sys can build for clippy)
        run: cargo pgrx init --pg16 /usr/lib/postgresql/16/bin/pg_config
      - name: rustfmt (glue only - vendored kernels kept byte-faithful)
        run: rustfmt --edition 2021 --check src/lib.rs
      - name: clippy (deny warnings)
        run: cargo clippy --no-default-features --features pg16 -- -D warnings

  security:
    name: cargo deny (advisories, bans, licenses, sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: cargo deny check
        run: cargo deny check

  test:
    name: cargo pgrx test (PG ${{ matrix.pg }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [14, 15, 16, 17, 18]
    steps:
      - uses: actions/checkout@v4
      - name: Add PGDG apt repo
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
      - name: Install PostgreSQL ${{ matrix.pg }} + build deps
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev clang build-essential
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-pg${{ matrix.pg }}-${{ hashFiles('Cargo.lock') }}
      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked
      - name: pgrx init against the system PG ${{ matrix.pg }}
        run: cargo pgrx init --pg${{ matrix.pg }} /usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
      - name: Make PG install dirs writable (pgrx test installs the extension in-place)
        run: |
          PGC=/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config
          sudo chmod a+w "$("$PGC" --sharedir)/extension" "$("$PGC" --pkglibdir)"
      - name: cargo pgrx test (incl. honesty gate)
        run: cargo pgrx test pg${{ matrix.pg }}

  e2e:
    name: stock-PG install + integration (PG 18)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add PGDG apt repo + install PostgreSQL 18
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update
          sudo apt-get install -y postgresql-18 postgresql-server-dev-18 libclang-dev clang build-essential
      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked
      - name: pgrx init (PG 18)
        run: cargo pgrx init --pg18 /usr/lib/postgresql/18/bin/pg_config
      - name: End-to-end install + honesty gate + showcase + latency
        run: PG_CONFIG=/usr/lib/postgresql/18/bin/pg_config PATH="/usr/lib/postgresql/18/bin:$PATH" bash test/run_pgrx_test.sh
