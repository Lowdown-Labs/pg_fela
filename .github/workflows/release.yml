name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

permissions:
  contents: write
  packages: write
  id-token: write
  actions: read

env:
  REGISTRY_IMAGE: ${{ vars.RELEASE_IMAGE || 'ghcr.io/lowdown-labs/pg_fela' }}
  PGRX_VERSION: "0.19.1"
  PACKAGE_VERSION: "1.0.0"
  FELATAB_MODEL_URL: ${{ vars.FELATAB_MODEL_URL || 'https://d1ruypri5fhwvl.cloudfront.net/felatab/v1/felatab_int8.safetensors' }}
  FELATAB_MODEL_SHA256: ${{ vars.FELATAB_MODEL_SHA256 || '547c451a182f4a61aa4ab811efd1fe2e8c57b75b61e4256b28114934dc539741' }}

jobs:
  # ---------------------------------------------------------------------------
  # One arch per NATIVE runner, pushed by digest. Merged into a multi-arch
  # manifest by the `merge` job below.
  #
  # This used to be a single job doing `platforms: linux/amd64,linux/arm64` with
  # docker/setup-qemu-action. Measured on v1.0.0: the amd64 half took 7.4 min and
  # the whole step took 72.5 min, because arm64 was emulated through QEMU. No
  # amount of layer caching fixes that -- the build is slow for reasons unrelated
  # to cache misses. GitHub gives public repos free `ubuntu-24.04-arm` runners, so
  # arm64 now compiles natively and the smoke test runs on real hardware for BOTH
  # arches instead of only amd64.
  # ---------------------------------------------------------------------------
  build:
    name: build + smoke (PG ${{ matrix.pg }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
        arch: [amd64, arm64]
        # `include` only attaches runner/platform to an EXISTING arch value. If arch
        # were not a matrix dimension, each include object would be merged into every
        # combination and the last would win -- all nine jobs would build arm64.
        include:
          - arch: amd64
            runner: ubuntu-latest
            platform: linux/amd64
          - arch: arm64
            runner: ubuntu-24.04-arm
            platform: linux/arm64
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute version (git tag, or 'dev' for non-tag runs)
        id: ver
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, locally, and smoke it before anything is published. On a native
      # runner this is the same image we then push, not a second compilation.
      - name: Build image (local load, pre-push smoke gate)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            FELATAB_MODEL_URL=${{ env.FELATAB_MODEL_URL }}
            FELATAB_MODEL_SHA256=${{ env.FELATAB_MODEL_SHA256 }}
          load: true
          push: false
          tags: pg_fela:smoke-pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-from: type=gha,scope=pg${{ matrix.pg }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=pg${{ matrix.pg }}-${{ matrix.arch }}

      - name: Smoke test - CREATE EXTENSION + fela_automl on a tiny inline table
        run: |
          set -euo pipefail
          CID=$(docker run -d -e POSTGRES_PASSWORD=postgres pg_fela:smoke-pg${{ matrix.pg }}-${{ matrix.arch }})
          trap 'docker logs "$CID" || true; docker rm -f "$CID" >/dev/null 2>&1 || true' EXIT

          echo "waiting for postgres to accept connections..."
          ready=0
          for i in $(seq 1 60); do
            if docker exec "$CID" pg_isready -U postgres >/dev/null 2>&1; then ready=1; break; fi
            sleep 2
          done
          if [ "$ready" -ne 1 ]; then
            echo "FAIL: postgres never became ready"
            exit 1
          fi

          OUT=$(docker exec -i "$CID" psql -U postgres -v ON_ERROR_STOP=1 -qAt <<'SQL'
          CREATE EXTENSION IF NOT EXISTS pg_fela;
          DROP TABLE IF EXISTS smoke_tbl;
          CREATE TABLE smoke_tbl (id serial, x1 float8, x2 float8, y text);
          INSERT INTO smoke_tbl (x1, x2, y) VALUES
            (1.0, 1.1, 'a'), (1.1, 0.9, 'a'), (1.2, 1.0, 'a'),
            (9.0, 9.1, 'b'), (9.1, 8.9, 'b'), (9.2, 9.0, 'b'),
            (5.0, 5.0, NULL);
          SELECT prediction FROM fela_automl('smoke_tbl', 'y');
          SQL
          )

          echo "fela_automl prediction (encoded class id): '${OUT}'"
          if [[ "$OUT" != "0" && "$OUT" != "1" ]]; then
            echo "FAIL: expected a zero-config prediction of 0 or 1 (encoded class) from the installed model, got: '$OUT'"
            exit 1
          fi
          echo "SMOKE OK (PG ${{ matrix.pg }}, ${{ matrix.arch }})."

      - name: Log in to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Push the single-arch image by DIGEST only (no tag). The merge job assembles
      # the tags from these digests, so no half-built manifest is ever tag-visible.
      - name: Push by digest
        id: push
        if: startsWith(github.ref, 'refs/tags/v')
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            PG_MAJOR=${{ matrix.pg }}
            FELATAB_MODEL_URL=${{ env.FELATAB_MODEL_URL }}
            FELATAB_MODEL_SHA256=${{ env.FELATAB_MODEL_SHA256 }}
          push: true
          outputs: type=image,name=${{ env.REGISTRY_IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=pg${{ matrix.pg }}-${{ matrix.arch }}

      - name: Export digest
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          mkdir -p /tmp/digests
          echo "${{ steps.push.outputs.digest }}" > "/tmp/digests/pg${{ matrix.pg }}-${{ matrix.arch }}.txt"

      - name: Upload digest
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: digest-pg${{ matrix.pg }}-${{ matrix.arch }}
          path: /tmp/digests/pg${{ matrix.pg }}-${{ matrix.arch }}.txt
          if-no-files-found: error
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stitch the two per-arch digests into one multi-arch manifest, tag it, sign it.
  # ---------------------------------------------------------------------------
  merge:
    name: multi-arch manifest (PG ${{ matrix.pg }})
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    outputs:
      digest_16: ${{ steps.expose.outputs.digest_16 }}
      digest_17: ${{ steps.expose.outputs.digest_17 }}
      digest_18: ${{ steps.expose.outputs.digest_18 }}
    steps:
      - name: Download this PG's digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-pg${{ matrix.pg }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          V="${GITHUB_REF#refs/tags/v}"
          TAGS="-t ${REGISTRY_IMAGE}:pg${{ matrix.pg }} -t ${REGISTRY_IMAGE}:${V}-pg${{ matrix.pg }}"
          if [ "${{ matrix.pg }}" = "18" ]; then TAGS="$TAGS -t ${REGISTRY_IMAGE}:latest"; fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Create and push the manifest list
        run: |
          set -euo pipefail
          SRC=""
          for f in /tmp/digests/*.txt; do
            SRC="$SRC ${REGISTRY_IMAGE}@$(cat "$f")"
          done
          echo "merging:$SRC"
          docker buildx imagetools create ${{ steps.tags.outputs.tags }} $SRC

      - name: Expose merged digest for SLSA provenance
        id: expose
        run: |
          set -euo pipefail
          D=$(docker buildx imagetools inspect "${REGISTRY_IMAGE}:pg${{ matrix.pg }}" \
                --format '{{json .Manifest}}' | jq -r .digest)
          echo "merged digest: $D"
          echo "digest=$D" >> "$GITHUB_OUTPUT"
          echo "digest_${{ matrix.pg }}=$D" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the merged manifest (keyless OIDC)
        run: cosign sign --yes "${REGISTRY_IMAGE}@${{ steps.expose.outputs.digest }}"

      - name: SBOM (syft) for the merged image
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY_IMAGE }}:pg${{ matrix.pg }}
          format: spdx-json
          output-file: sbom-pg${{ matrix.pg }}.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pg${{ matrix.pg }}
          path: sbom-pg${{ matrix.pg }}.spdx.json
          if-no-files-found: error

  provenance:
    name: SLSA provenance (PG ${{ matrix.pg }})
    needs: merge
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ vars.RELEASE_IMAGE || 'ghcr.io/lowdown-labs/pg_fela' }}
      digest: ${{ matrix.pg == 16 && needs.merge.outputs.digest_16 || (matrix.pg == 17 && needs.merge.outputs.digest_17 || needs.merge.outputs.digest_18) }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  deb-artifacts:
    name: .deb package (PG ${{ matrix.pg }}, amd64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@v4

      - name: Add PGDG apt repo
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg }} + build deps
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev clang build-essential

      - name: Rust toolchain
        run: rustup component add rustfmt

      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against system PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: Build .deb
        run: |
          bash packaging/build-deb.sh "${{ matrix.pg }}" "${PACKAGE_VERSION}" \
            "target/release/pg_fela-pg${{ matrix.pg }}" \
            "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"

      - name: Verify .deb contents
        run: |
          dpkg-deb --info "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"
          dpkg-deb --contents "pg-fela-pg${{ matrix.pg }}_${PACKAGE_VERSION}_amd64.deb"

      - uses: actions/upload-artifact@v4
        with:
          name: pg-fela-pg${{ matrix.pg }}-deb
          path: pg-fela-pg${{ matrix.pg }}_*_amd64.deb
          if-no-files-found: error

  rpm-artifacts:
    name: .rpm package (PG ${{ matrix.pg }}, x86_64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - name: Add PGDG yum repo + build deps
        run: |
          dnf install -y https://download.postgresql.org/pub/repos/yum/reporpms/EL-9-x86_64/pgdg-redhat-repo-latest.noarch.rpm
          dnf -qy module disable postgresql
          dnf install -y dnf-plugins-core
          dnf config-manager --set-enabled crb
          dnf install -y --allowerasing \
            "postgresql${{ matrix.pg }}-devel" rpm-build clang llvm-devel gcc make \
            curl git openssl-devel pkgconf-pkg-config

      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against PGDG PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/pgsql-${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/pgsql-${{ matrix.pg }}/bin/pg_config"

      - name: Build .rpm
        run: |
          mkdir -p dist
          bash packaging/build-rpm.sh "${{ matrix.pg }}" "${PACKAGE_VERSION}" \
            "target/release/pg_fela-pg${{ matrix.pg }}" dist

      - name: Verify .rpm contents
        run: |
          rpm -qip dist/*.rpm
          rpm -qlp dist/*.rpm

      - uses: actions/upload-artifact@v4
        with:
          name: pg-fela-pg${{ matrix.pg }}-rpm
          path: dist/*.rpm
          if-no-files-found: error

  release-artifacts:
    name: package tarball (PG ${{ matrix.pg }}, amd64)
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [16, 17, 18]
    steps:
      - uses: actions/checkout@v4

      - name: Add PGDG apt repo
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] \
            https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list >/dev/null
          sudo apt-get update

      - name: Install PostgreSQL ${{ matrix.pg }} + build deps
        run: |
          sudo apt-get install -y \
            postgresql-${{ matrix.pg }} postgresql-server-dev-${{ matrix.pg }} \
            libclang-dev clang build-essential

      - name: Rust toolchain
        run: rustup component add rustfmt

      # `cargo install cargo-pgrx` recompiles the tool from source on every job:
      # measured 1.7-2.8 min each, across 7 CI jobs and 9 release jobs. The existing
      # cargo cache holds ~/.cargo/registry and target/, but NOT the built binary, so
      # it only trimmed the compile rather than skipping it. Cache the binary itself,
      # keyed on the pinned version, and skip the install on a hit.
      - name: Cache cargo-pgrx binary
        id: pgrx_bin
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-pgrx
          key: cargo-pgrx-${{ runner.os }}-${{ runner.arch }}-${{ env.PGRX_VERSION }}
      - name: Install cargo-pgrx
        if: steps.pgrx_bin.outputs.cache-hit != 'true'
        run: cargo install cargo-pgrx --version "${PGRX_VERSION}" --locked

      - name: pgrx init against system PG ${{ matrix.pg }}
        run: cargo pgrx init "--pg${{ matrix.pg }}" "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: cargo pgrx package
        run: cargo pgrx package --pg-config "/usr/lib/postgresql/${{ matrix.pg }}/bin/pg_config"

      - name: Tarball the staged extension tree
        run: |
          STAGE="target/release/pg_fela-pg${{ matrix.pg }}"
          test -d "$STAGE" || { echo "FAIL: staged tree $STAGE not found"; exit 1; }
          tar czf "pg_fela-pg${{ matrix.pg }}-amd64.tar.gz" -C "$(dirname "$STAGE")" "$(basename "$STAGE")"

      - uses: actions/upload-artifact@v4
        with:
          name: pg_fela-pg${{ matrix.pg }}-amd64
          path: pg_fela-pg${{ matrix.pg }}-amd64.tar.gz
          if-no-files-found: error

  release:
    name: GitHub Release
    needs: [merge, deb-artifacts, rpm-artifacts, release-artifacts]
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      # Download ONLY what the release publishes. Without a pattern this pulls all 21
      # artifacts (~600 MB), including the six *.dockerbuild blobs buildx uploads on
      # its own and that nothing below globs. On v1.0.0 that step failed twice with
      # "Artifact download failed after 5 retries" on one blob, while every artifact
      # fetched fine through the REST API — so the payload, not the data, was the
      # problem. Each pattern is its own step because `pattern` takes a single glob.
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true, pattern: 'pg_fela-*-amd64' }
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true, pattern: 'pg-fela-*-deb' }
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true, pattern: 'pg-fela-*-rpm' }
      - uses: actions/download-artifact@v4
        with: { path: dist, merge-multiple: true, pattern: 'sbom-pg*' }

      - name: Show what will be attached
        run: ls -la dist/

      - name: Create GitHub Release with all package assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.deb
            dist/*.rpm
            dist/*.spdx.json
